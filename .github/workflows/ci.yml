name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e "./implementation[dev]"
      - name: Pytest
        run: pytest implementation/tests/ -q -k "not gpu"
      - name: Simulation smoke
        run: python validation/vv/run_sentry_simulation.py
      - name: Defense readiness audit
        run: python run_complete_audit.py
