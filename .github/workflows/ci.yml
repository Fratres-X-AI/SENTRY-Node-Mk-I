name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate JSON configs
        run: |
          python -m json.tool configs/procurement_bom.json >/dev/null
          python -m json.tool configs/sentry_node_config.json >/dev/null
          python -m json.tool configs/deployment_site_alpha.json >/dev/null
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e "./implementation[dev]"
      - name: Pytest
        working-directory: implementation
        run: pytest tests --cov=sentry --cov-fail-under=100 -q -k "not gpu"
      - name: Mypy
        working-directory: implementation
        run: mypy src/sentry
      - name: Simulation smoke
        run: python validation/vv/run_sentry_simulation.py
      - name: Build readiness (software gate)
        run: python validation/build_readiness.py
      - name: Defense readiness audit
        run: python run_complete_audit.py
